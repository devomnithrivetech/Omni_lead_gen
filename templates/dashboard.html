<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omnithrive — Lead Pipeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #6c63ff;
      --accent-hover: #8b85ff;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --green: #34d399;
      --blue: #60a5fa;
      --yellow: #fbbf24;
      --red: #f87171;
      --purple: #c084fc;
      --orange: #fb923c;
      --scraped: #64748b;
      --enriched: #60a5fa;
      --drafted: #a78bfa;
      --sent: #34d399;
      --opened: #fbbf24;
      --replied: #4ade80;
      --radius: 10px;
      --shadow: 0 4px 20px rgba(0,0,0,.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
    header span { color: var(--accent); }
    .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    #refresh-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background .15s;
    }
    #refresh-btn:hover { background: var(--accent-hover); }
    #last-updated { color: var(--text-muted); font-size: 12px; }

    /* ---- Metrics bar ---- */
    #metrics {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      padding: 20px 28px;
    }
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: var(--shadow);
    }
    .metric-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); }
    .metric-value { font-size: 32px; font-weight: 700; line-height: 1; }
    .m-scraped  .metric-value { color: var(--scraped); }
    .m-enriched .metric-value { color: var(--blue); }
    .m-sent     .metric-value { color: var(--green); }
    .m-opened   .metric-value { color: var(--yellow); }
    .m-replied  .metric-value { color: #4ade80; }
    .m-noreply  .metric-value { color: var(--red); }

    /* ---- Toolbar ---- */
    #toolbar {
      padding: 0 28px 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    #search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 12px;
      font-size: 13px;
      width: 260px;
      outline: none;
    }
    #search-input:focus { border-color: var(--accent); }
    #status-filter {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }
    .row-count { margin-left: auto; color: var(--text-muted); font-size: 12px; }

    /* ---- Table ---- */
    #table-wrap {
      padding: 0 28px 40px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    thead tr { background: #12151f; }
    th {
      padding: 12px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      max-width: 260px;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.025); }

    .company-cell { font-weight: 600; }
    .snippet-cell { color: var(--text-muted); font-size: 12px; line-height: 1.4; }
    .keywords-cell { font-size: 12px; color: #a78bfa; }
    .email-preview {
      font-size: 12px;
      color: var(--text-muted);
      white-space: pre-wrap;
      max-height: 80px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .email-preview.expanded { max-height: none; }
    .expand-hint {
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      margin-top: 2px;
    }

    /* Status badge */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: capitalize;
    }
    .badge-scraped  { background: rgba(100,116,139,.2); color: #94a3b8; }
    .badge-enriched { background: rgba(96,165,250,.15); color: #60a5fa; }
    .badge-drafted  { background: rgba(167,139,250,.15); color: #a78bfa; }
    .badge-sent     { background: rgba(52,211,153,.15); color: #34d399; }
    .badge-opened   { background: rgba(251,191,36,.15); color: #fbbf24; }
    .badge-replied  { background: rgba(74,222,128,.15); color: #4ade80; }

    /* Send button */
    .send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: .45; cursor: default; }
    .sent-label { color: var(--green); font-size: 12px; font-weight: 600; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      z-index: 1000;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: #16a34a; }
    #toast.error   { background: #dc2626; }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 900;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 640px;
      width: 90%;
      box-shadow: var(--shadow);
      position: relative;
      max-height: 80vh;
      overflow-y: auto;
    }
    #modal h2 { font-size: 16px; margin-bottom: 16px; }
    #modal .modal-field { margin-bottom: 12px; }
    #modal .modal-label { font-size: 11px; text-transform: uppercase; letter-spacing: .7px; color: var(--text-muted); margin-bottom: 4px; }
    #modal .modal-value { font-size: 13px; white-space: pre-wrap; word-break: break-word; }
    #modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; color: var(--text-muted);
      font-size: 20px; cursor: pointer; line-height: 1;
    }
    #modal-close:hover { color: var(--text); }
    #modal-send-btn {
      margin-top: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #modal-send-btn:hover { background: var(--accent-hover); }
    #modal-send-btn:disabled { opacity: .45; cursor: default; }

    /* Empty state */
    .empty-row td {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }

    @media (max-width: 1100px) {
      #metrics { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      #metrics { grid-template-columns: repeat(2, 1fr); }
      #toolbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <h1>Omni<span>thrive</span> Lead Pipeline</h1>
  <div class="header-right">
    <span id="last-updated"></span>
    <button id="refresh-btn" onclick="loadAll()">Refresh</button>
  </div>
</header>

<!-- Metrics Bar -->
<div id="metrics">
  <div class="metric-card m-scraped">
    <div class="metric-label">Scraped</div>
    <div class="metric-value" id="m-scraped">—</div>
  </div>
  <div class="metric-card m-enriched">
    <div class="metric-label">Enriched</div>
    <div class="metric-value" id="m-enriched">—</div>
  </div>
  <div class="metric-card m-sent">
    <div class="metric-label">Sent</div>
    <div class="metric-value" id="m-sent">—</div>
  </div>
  <div class="metric-card m-opened">
    <div class="metric-label">Opened</div>
    <div class="metric-value" id="m-opened">—</div>
  </div>
  <div class="metric-card m-replied">
    <div class="metric-label">Replied</div>
    <div class="metric-value" id="m-replied">—</div>
  </div>
  <div class="metric-card m-noreply">
    <div class="metric-label">No Reply</div>
    <div class="metric-value" id="m-noreply">—</div>
  </div>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <input id="search-input" type="text" placeholder="Search company, keyword, email..." oninput="renderTable()" />
  <select id="status-filter" onchange="renderTable()">
    <option value="">All statuses</option>
    <option value="scraped">Scraped</option>
    <option value="enriched">Enriched</option>
    <option value="drafted">Drafted</option>
    <option value="sent">Sent</option>
    <option value="opened">Opened</option>
    <option value="replied">Replied</option>
  </select>
  <span class="row-count" id="row-count"></span>
</div>

<!-- Table -->
<div id="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Company</th>
        <th>Job Title</th>
        <th>Keywords</th>
        <th>JD Snippet</th>
        <th>Drafted Email</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr class="empty-row"><td colspan="8">Loading...</td></tr>
    </tbody>
  </table>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">&times;</button>
    <h2 id="modal-title">Email Preview</h2>
    <div id="modal-body"></div>
    <button id="modal-send-btn" onclick="modalSend()">Send Email</button>
  </div>
</div>

<script>
  let allLeads = [];
  let modalLeadId = null;

  async function loadAll() {
    try {
      const [statsRes, leadsRes] = await Promise.all([
        fetch("/api/stats"),
        fetch("/api/leads"),
      ]);
      const stats = await statsRes.json();
      const leads = await leadsRes.json();

      document.getElementById("m-scraped").textContent  = stats.total_scraped  ?? 0;
      document.getElementById("m-enriched").textContent = stats.total_enriched ?? 0;
      document.getElementById("m-sent").textContent     = stats.total_sent     ?? 0;
      document.getElementById("m-opened").textContent   = stats.total_opened   ?? 0;
      document.getElementById("m-replied").textContent  = stats.total_replied  ?? 0;
      document.getElementById("m-noreply").textContent  = stats.no_reply       ?? 0;

      allLeads = leads;
      renderTable();

      const now = new Date();
      document.getElementById("last-updated").textContent =
        "Updated " + now.toLocaleTimeString();
    } catch (e) {
      showToast("Failed to load data: " + e.message, "error");
    }
  }

  function renderTable() {
    const query  = document.getElementById("search-input").value.toLowerCase().trim();
    const filter = document.getElementById("status-filter").value;

    let rows = allLeads;
    if (filter) rows = rows.filter(l => l.status === filter);
    if (query) {
      rows = rows.filter(l =>
        (l.company_name || "").toLowerCase().includes(query) ||
        (l.tech_keywords || "").toLowerCase().includes(query) ||
        (l.decision_maker_email || "").toLowerCase().includes(query) ||
        (l.draft_email || "").toLowerCase().includes(query) ||
        (l.job_title || "").toLowerCase().includes(query)
      );
    }

    document.getElementById("row-count").textContent =
      rows.length + " lead" + (rows.length !== 1 ? "s" : "");

    const tbody = document.getElementById("table-body");

    if (rows.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">No leads match your filter.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map((lead, i) => {
      const status = (lead.status || "scraped").toLowerCase();
      const badgeClass = "badge badge-" + status;
      const canSend = (status === "drafted") && lead.decision_maker_email && lead.draft_email;
      const alreadySent = ["sent","opened","replied"].includes(status);

      const actionCell = canSend
        ? `<button class="send-btn" onclick="openModal(${lead.id})">Review &amp; Send</button>`
        : alreadySent
          ? `<span class="sent-label">&#10003; Sent</span>`
          : `<span style="color:var(--text-muted);font-size:12px;">—</span>`;

      const snippet = escHtml(lead.job_description || "").substring(0, 160);
      const keywords = escHtml(lead.tech_keywords || "—");
      const emailPreview = escHtml((lead.draft_email || "—").substring(0, 180));

      return `<tr>
        <td style="color:var(--text-muted);font-size:12px;">${i + 1}</td>
        <td class="company-cell">${escHtml(lead.company_name || "—")}<br>
          <span style="font-size:11px;color:var(--text-muted);font-weight:400;">${escHtml(lead.decision_maker_email || "")}</span>
        </td>
        <td style="font-size:12px;">${escHtml(lead.job_title || "—")}</td>
        <td class="keywords-cell">${keywords}</td>
        <td class="snippet-cell">${snippet}${lead.job_description && lead.job_description.length > 160 ? "…" : ""}</td>
        <td>
          <div class="email-preview" id="ep-${lead.id}">${emailPreview}${(lead.draft_email || "").length > 180 ? "…" : ""}</div>
          ${lead.draft_email ? `<div class="expand-hint" onclick="openModal(${lead.id})">View full email</div>` : ""}
        </td>
        <td><span class="${badgeClass}">${status}</span></td>
        <td>${actionCell}</td>
      </tr>`;
    }).join("");
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ---- Modal ----
  function openModal(leadId) {
    const lead = allLeads.find(l => l.id === leadId);
    if (!lead) return;
    modalLeadId = leadId;

    document.getElementById("modal-title").textContent =
      (lead.company_name || "Lead") + " — Email Preview";

    const status = (lead.status || "").toLowerCase();
    const canSend = status === "drafted" && lead.decision_maker_email && lead.draft_email;
    const alreadySent = ["sent","opened","replied"].includes(status);

    const btn = document.getElementById("modal-send-btn");
    btn.style.display = canSend ? "inline-block" : "none";
    btn.disabled = false;
    btn.textContent = "Send Email";

    document.getElementById("modal-body").innerHTML = `
      <div class="modal-field">
        <div class="modal-label">To</div>
        <div class="modal-value">${escHtml(lead.decision_maker_name || "")} &lt;${escHtml(lead.decision_maker_email || "—")}&gt;</div>
      </div>
      <div class="modal-field">
        <div class="modal-label">Subject</div>
        <div class="modal-value">${escHtml(lead.draft_subject || "—")}</div>
      </div>
      <div class="modal-field">
        <div class="modal-label">Body</div>
        <div class="modal-value" style="background:#12151f;border-radius:6px;padding:12px;font-size:13px;">${escHtml(lead.draft_email || "—")}</div>
      </div>
      ${alreadySent ? `<div style="color:var(--green);font-size:13px;margin-top:8px;">&#10003; Email already sent (status: ${escHtml(status)})</div>` : ""}
    `;

    document.getElementById("modal-overlay").classList.add("open");
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById("modal-overlay")) return;
    document.getElementById("modal-overlay").classList.remove("open");
    modalLeadId = null;
  }

  async function modalSend() {
    if (!modalLeadId) return;
    const btn = document.getElementById("modal-send-btn");
    btn.disabled = true;
    btn.textContent = "Sending…";

    const ok = await sendLead(modalLeadId);
    if (ok) {
      document.getElementById("modal-overlay").classList.remove("open");
      await loadAll();
    } else {
      btn.disabled = false;
      btn.textContent = "Retry Send";
    }
  }

  async function sendLead(leadId) {
    try {
      const res = await fetch("/api/leads/" + leadId + "/send", { method: "POST" });
      const data = await res.json();
      if (res.ok && data.ok) {
        showToast("Email sent successfully!", "success");
        return true;
      } else {
        showToast("Send failed: " + (data.error || "Unknown error"), "error");
        return false;
      }
    } catch (e) {
      showToast("Network error: " + e.message, "error");
      return false;
    }
  }

  // ---- Toast ----
  let toastTimer = null;
  function showToast(msg, type) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "show " + type;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ""; }, 4000);
  }

  // Auto-refresh every 60 seconds
  setInterval(loadAll, 60000);

  // Initial load
  loadAll();
</script>
</body>
</html>
